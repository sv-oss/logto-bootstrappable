name: Build

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            platform_tag: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/sv-oss/logto-bootstrappable
          tags: |
            type=ref,event=pr
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/sv-oss/logto-bootstrappable,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/sv-oss/logto-bootstrappable
          tags: |
            type=ref,event=pr
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/sv-oss/logto-bootstrappable@sha256:%s ' *)

      - name: Annotate workflow with image tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## 🐳 Docker Image Tags"
            echo ""
            echo "| Tag | Pull Command |"
            echo "|-----|-------------|"
            while IFS= read -r tag; do
              [ -n "$tag" ] && echo "| \`${tag}\` | \`docker pull ${tag}\` |"
            done <<< "$TAGS"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build PR comment body
        id: pr-comment
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          body_file=$(mktemp)
          {
            echo "<!-- docker-preview -->"
            echo "## 🐳 Docker Image Preview"
            echo ""
            echo "Multi-arch image (\`linux/amd64\` + \`linux/arm64\`) built for this PR:"
            echo ""
            echo "| Tag | Pull Command |"
            echo "|-----|-------------|"
            while IFS= read -r tag; do
              [ -n "$tag" ] && echo "| \`${tag}\` | \`docker pull ${tag}\` |"
            done <<< "$TAGS"
          } > "$body_file"
          echo "body_file=${body_file}" >> "$GITHUB_OUTPUT"

      - name: Find existing PR comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '<!-- docker-preview -->'

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ steps.pr-comment.outputs.body_file }}
          edit-mode: replace

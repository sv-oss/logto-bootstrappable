name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      next_version: ${{ steps.next-version.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Extract next version from release PR
        id: next-version
        if: ${{ !steps.release.outputs.release_created }}
        env:
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          version=$(echo "$PRS_JSON" | jq -r 'if length > 0 then .[0].title else "" end' | (grep -oP '\d+\.\d+\.\d+' || true) | head -1)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build:
    needs: release-please
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            platform_tag: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/sv-oss/logto-bootstrappable
          tags: |
            type=sha
            type=edge
            # On release: stable version tag + latest
            type=raw,value=v${{ needs.release-please.outputs.version }},enable=${{ needs.release-please.outputs.release_created == 'true' }}
            type=raw,value=latest,enable=${{ needs.release-please.outputs.release_created == 'true' }}
            # On edge: RC tag using the pending release version when known
            type=raw,value=v${{ needs.release-please.outputs.next_version }}-rc.${{ github.run_number }},enable=${{ needs.release-please.outputs.release_created != 'true' && needs.release-please.outputs.next_version != '' }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/sv-oss/logto-bootstrappable,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [release-please, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/sv-oss/logto-bootstrappable
          tags: |
            type=sha
            type=edge
            # On release: stable version tag + latest
            type=raw,value=v${{ needs.release-please.outputs.version }},enable=${{ needs.release-please.outputs.release_created == 'true' }}
            type=raw,value=latest,enable=${{ needs.release-please.outputs.release_created == 'true' }}
            # On edge: RC tag using the pending release version when known
            type=raw,value=v${{ needs.release-please.outputs.next_version }}-rc.${{ github.run_number }},enable=${{ needs.release-please.outputs.release_created != 'true' && needs.release-please.outputs.next_version != '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/sv-oss/logto-bootstrappable@sha256:%s ' *)

